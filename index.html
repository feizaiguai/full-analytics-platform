<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Analytics Platform - by Daomei</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🚀 Full Analytics Platform</h1>
  <p class="subtitle">A functional demo built by Daomei AI</p>
  <div class="demo-area" id="demoArea">
    <div class="feature-cards" id="features"></div>
    <div class="interactive">
      <input type="text" id="userInput" placeholder="Type something...">
      <button onclick="processInput()">Run</button>

  </div>
  <div class="stats">
    <span id="counter">Ready</span>
    <span id="timer">0s</span>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
